name: "Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: setup msbuild
        uses: microsoft/setup-msbuild@v2

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build C++ Native Engine
        run: |
          mkdir build_cpp
          cd build_cpp
          cmake ../src/Engine/PhotonXPro.Engine.Native
          cmake --build . --config Release
          
          # Create the directory structure Tauri expects
          mkdir -p ../src/UI/PhotonXPro.UI.Tauri/build/Engine/Native/bin/Release
          
          # Find and copy the DLL (MSVC often puts it in Release/ subdirectory)
          if (Test-Path "bin/Release/PhotonXPro.Engine.Native.dll") {
            cp bin/Release/PhotonXPro.Engine.Native.dll ../src/UI/PhotonXPro.UI.Tauri/build/Engine/Native/bin/Release/
          } elseif (Test-Path "Release/PhotonXPro.Engine.Native.dll") {
            cp Release/PhotonXPro.Engine.Native.dll ../src/UI/PhotonXPro.UI.Tauri/build/Engine/Native/bin/Release/
          } else {
            echo "Error: DLL not found in expected locations."
            exit 1
          }

      - name: install frontend dependencies
        run: |
          cd src/UI/PhotonXPro.UI.Tauri
          npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action automatically replaces this with the version from tauri.conf.json
          releaseName: "Photon X Pro v__VERSION__"
          releaseBody: "See the assets below to download the installer."
          releaseDraft: true
          prerelease: false
          projectPath: src/UI/PhotonXPro.UI.Tauri
