name: "Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: setup msbuild
        uses: microsoft/setup-msbuild@v2

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build C++ Native Engine
        run: |
          cd src/Engine/PhotonXPro.Engine.Native
          msbuild /p:Configuration=Release /p:Platform=x64

      - name: install frontend dependencies
        run: |
          cd src/UI/PhotonXPro.UI.Tauri
          npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action automatically replaces this with the version from tauri.conf.json
          releaseName: "Photon X Pro v__VERSION__"
          releaseBody: "See the assets below to download the installer."
          releaseDraft: true
          prerelease: false
          projectPath: src/UI/PhotonXPro.UI.Tauri
